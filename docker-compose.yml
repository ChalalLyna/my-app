services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true    # gère le polling côté Next.js
      - CHOKIDAR_USEPOLLING=true  # fallback pour les autres watchers
    volumes:
      - .:/app                    # votre code
      - /app/node_modules         # node_modules isolé dans le conteneur
      - /app/.next                # .next isolé aussi